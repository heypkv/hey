name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Rapid pushes supersede in-progress runs cleanly instead of competing for
# scarce runners (which shows up as "runner received a shutdown signal").
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false # one leg's infra hiccup shouldn't cancel the others
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  integration:
    # Real-network + process-lifecycle tests; main only for rate-limit hygiene.
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./cmd/hey -run Integration -v -timeout 300s
        env:
          HEY_INTEGRATION: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
